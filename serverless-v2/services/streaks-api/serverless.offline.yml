service: streaks-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  stage: local
  region: us-east-1
  environment:
    STAGE: local
    STREAKS_PLAYERS_TABLE: streaks-players
    STREAKS_ACTIVITY_TABLE: streaks-activity
    STREAKS_REWARDS_TABLE: streaks-rewards
    STREAKS_FREEZE_HISTORY_TABLE: streaks-freeze-history
    INTERNAL_API_SECRET: dev-internal-secret
    FREEZE_CRON_ENABLED: false
    # DynamoDB Local wiring. serverless-offline overrides the process AWS creds
    # at invocation, so declare them here (authoritative for the lambda) — the
    # shared DocumentClient (shared/config/dynamo.js) reads these to point at
    # DynamoDB Local with the literal local/local creds (Inv 12). Falls back to
    # the container env when set.
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, 'http://localhost:8000'}
    AWS_ACCESS_KEY_ID: ${env:AWS_ACCESS_KEY_ID, 'local'}
    AWS_SECRET_ACCESS_KEY: ${env:AWS_SECRET_ACCESS_KEY, 'local'}
    AWS_REGION: ${env:AWS_REGION, 'us-east-1'}

functions:
  api:
    handler: handler.api
    events:
      - httpApi: '*'

  # [BONUS] Scheduled-freeze cron (FR-10, ARCHITECTURE §5f). Declared here too so
  # it is invocable locally (`serverless invoke local -f scheduledFreeze`). The
  # `schedule` event is disabled by default (FREEZE_CRON_ENABLED, default 'false')
  # so serverless-offline never auto-fires it; an explicit invoke runs it once.
  scheduledFreeze:
    handler: src/handlers/scheduled-freeze.scheduledFreeze
    events:
      - schedule:
          rate: cron(5 1 * * ? *)
          enabled: ${env:FREEZE_CRON_ENABLED, 'false'}

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    exclude:
      - '@aws-sdk/*'
      # winston is pulled in via shared/config/logger.js (require('winston')).
      # esbuild can't resolve it from the shared dir, so keep it external; it
      # resolves from streaks-api/node_modules at runtime.
      - 'winston'
  serverless-offline:
    httpPort: 5001
    lambdaPort: 5003
