service: streaks-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  memorySize: 256
  timeout: 30
  environment:
    STAGE: ${self:provider.stage}

functions:
  api:
    handler: handler.api
    events:
      - httpApi: '*'

  # [BONUS] Scheduled-freeze cron (FR-10, ARCHITECTURE §5f). Proactively settles
  # missed-day freezes for absent players, reusing the SAME freeze.service decision
  # + consumeFreeze atomic the live path uses (ADR-2). NOT an HTTP route (§6).
  # Disabled by DEFAULT (FR-10): the `schedule` event's `enabled` is driven by
  # FREEZE_CRON_ENABLED (default 'false'), so the cron never fires unless opted in.
  scheduledFreeze:
    handler: src/handlers/scheduled-freeze.scheduledFreeze
    events:
      - schedule:
          rate: cron(5 1 * * ? *) # 01:05 UTC daily (just after the 01:00 UTC freeze tick)
          enabled: ${env:FREEZE_CRON_ENABLED, 'false'}

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    exclude:
      - '@aws-sdk/*'
      # winston is pulled in via shared/config/logger.js (require('winston')).
      # esbuild can't resolve it from the shared dir, so keep it external; it
      # resolves from streaks-api/node_modules at runtime.
      - 'winston'
